# Shared settings applied to every model. Per-model sections ([<backbone>.train])
# carry the optimizer/scheduler settings for that backbone; only configured
# backbones can be trained or compared. Valid section names: enet, vit, resnet,
# pcnn, focusnet.
batch_size = 8   # Training batch size.
crop_size = 224  # Size to crop images to.
device = "cuda"  # Device for training.
epoch_count = 15 # Number of training epochs.
num_classes = 20 # Number of classifications, set to 1 for regression training.
num_workers = 2  # Data-loading subprocesses.
val_split = 0.2  # Fraction of data for validation.
# Std dev (in bins) of the soft ordinal target distribution for classification
# (SORD); near-miss bins keep some probability mass. 0 keeps hard one-hot labels.
soft_label_sigma = 1.0

[paths]
dataset_root = "MW_Dataset_Sample"
meta_csv_name = "ODP-DLHM-Database.csv" # Name of the metadata CSV file.

[flags]
checkpoint = false # Continue from checkpoint
create_csv = false # Create a CSV for data.
fixed_seed = true  # Keep the random seed consistent.
sample = false     # Use sample data provided.

[enet.train]
backbone = "enet"
learning_rate = 1e-4          # default: 1e-4, How fast should the model change epoch to epoch
optimizer_weight_decay = 1e-2 # discourages overfitting by adding a penalty to the models weights
sch_factor = 0.1              # how much to decrease the learning rate (< 1.0)
sch_patience = 7              # how many epochs with no improvement for the learning rate to be reduced

[focusnet.train]
backbone = "focusnet"
learning_rate = 1e-4
optimizer_weight_decay = 1e-2
sch_factor = 0.1
sch_patience = 7

